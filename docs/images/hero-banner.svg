<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 400" width="1920" height="400">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="heroGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="400" fill="url(#heroGradient)"/>
  
  <!-- Circuit Pattern Background -->
  <g stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.1">
    <!-- Horizontal lines -->
    <path d="M100 50 L400 50 L450 100 L750 100"/>
    <path d="M150 350 L450 350 L500 300 L800 300"/>
    <path d="M1200 80 L1500 80 L1550 130 L1800 130"/>
    <path d="M1150 320 L1450 320 L1500 270 L1750 270"/>
    
    <!-- Vertical lines -->
    <path d="M200 20 L200 150"/>
    <path d="M1700 250 L1700 380"/>
    <path d="M960 0 L960 100"/>
    <path d="M960 300 L960 400"/>
    
    <!-- Connection points -->
    <circle cx="200" cy="50" r="6" fill="#3b82f6"/>
    <circle cx="450" cy="100" r="5" fill="#f97316"/>
    <circle cx="1700" cy="270" r="6" fill="#3b82f6"/>
    <circle cx="1550" cy="130" r="5" fill="#f97316"/>
    <circle cx="960" cy="100" r="5" fill="#3b82f6"/>
    <circle cx="960" cy="300" r="5" fill="#f97316"/>
    <circle cx="500" cy="300" r="4" fill="#3b82f6"/>
    <circle cx="1500" cy="270" r="4" fill="#f97316"/>
  </g>
  
  <!-- Glowing Orbs -->
  <circle cx="300" cy="200" r="80" fill="url(#accentGradient)" opacity="0.1" filter="url(#heroGlow)"/>
  <circle cx="1620" cy="200" r="80" fill="url(#accentGradient)" opacity="0.1" filter="url(#heroGlow)"/>
  
  <!-- Animated Signal Waves -->
  <g opacity="0.2" stroke="#3b82f6" stroke-width="2" fill="none">
    <path d="M50 200 Q100 170 150 200 T250 200"/>
    <path d="M1870 200 Q1820 230 1770 200 T1670 200"/>
  </g>
  
  <!-- Robot on left side -->
  <g transform="translate(250 200)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="120" fill="url(#accentGradient)" opacity="0.08" filter="url(#heroGlow)"/>
    
    <!-- Antenna -->
    <line x1="0" y1="-60" x2="0" y2="-80" stroke="#64748b" stroke-width="3"/>
    <circle cx="0" cy="-80" r="8" fill="#f97316"/>
    
    <!-- Head -->
    <rect x="-55" y="-60" width="110" height="85" rx="15" fill="#1e293b"/>
    <rect x="-50" y="-55" width="100" height="75" rx="12" fill="#334155"/>
    
    <!-- Eyes -->
    <rect x="-45" y="-45" width="90" height="40" rx="8" fill="#0f172a"/>
    
    <!-- Left Eye -->
    <ellipse cx="-20" cy="-25" rx="15" ry="11" fill="#3b82f6"/>
    <ellipse cx="-20" cy="-28" rx="5" ry="3" fill="#fff" opacity="0.9"/>
    
    <!-- Right Eye -->
    <ellipse cx="20" cy="-25" rx="15" ry="11" fill="#f97316"/>
    <ellipse cx="20" cy="-28" rx="5" ry="3" fill="#fff" opacity="0.9"/>
    
    <!-- Mouth Display -->
    <rect x="-35" y="10" width="70" height="18" rx="3" fill="#0f172a"/>
    <g fill="#10b981">
      <rect x="-28" y="15" width="4" height="8" rx="1"/>
      <rect x="-20" y="14" width="4" height="10" rx="1"/>
      <rect x="-12" y="15" width="4" height="8" rx="1"/>
      <rect x="-4" y="14" width="4" height="10" rx="1"/>
      <rect x="4" y="15" width="4" height="8" rx="1"/>
      <rect x="12" y="14" width="4" height="10" rx="1"/>
      <rect x="20" y="15" width="4" height="8" rx="1"/>
    </g>
  </g>
  
  <!-- Main Title Text -->
  <g transform="translate(960 200)">
    <!-- Logo Icon -->
    <g transform="translate(-400 0)">
      <circle cx="0" cy="0" r="40" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
      <text x="0" y="15" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="45" text-anchor="middle" fill="#f8fafc">🤖</text>
    </g>
    
    <!-- Title -->
    <text x="0" y="-20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="bold" fill="#f8fafc" text-anchor="middle">Tanner's Tech News</text>
    
    <!-- Tagline -->
    <text x="0" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle">AI-Curated Daily • Fresh Every Morning at 8am</text>
    
    <!-- Decorative Line -->
    <line x1="-150" y1="70" x2="150" y2="70" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Right side decorative elements -->
  <g transform="translate(1670 200)">
    <!-- Data streams -->
    <g opacity="0.2">
      <rect x="-60" y="-80" width="8" height="40" rx="2" fill="#3b82f6"/>
      <rect x="-40" y="-60" width="8" height="60" rx="2" fill="#f97316"/>
      <rect x="-20" y="-40" width="8" height="80" rx="2" fill="#3b82f6"/>
      <rect x="0" y="-70" width="8" height="50" rx="2" fill="#f97316"/>
      <rect x="20" y="-50" width="8" height="70" rx="2" fill="#3b82f6"/>
      <rect x="40" y="-30" width="8" height="60" rx="2" fill="#f97316"/>
      <rect x="60" y="-60" width="8" height="40" rx="2" fill="#3b82f6"/>
    </g>
  </g>
</svg>