<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e293b"/>
  
  <!-- Robot Head -->
  <g transform="translate(16 19)">
    <!-- Antenna -->
    <line x1="0" y1="-14" x2="0" y2="-18" stroke="#64748b" stroke-width="2"/>
    <circle cx="0" cy="-18" r="2" fill="#f97316"/>
    
    <!-- Head -->
    <rect x="-9" y="-14" width="18" height="16" rx="4" fill="#334155"/>
    
    <!-- Eyes -->
    <ellipse cx="-4" cy="-8" rx="3" ry="2.5" fill="#3b82f6"/>
    <ellipse cx="4" cy="-8" rx="3" ry="2.5" fill="#f97316"/>
    
    <!-- Mouth -->
    <rect x="-6" y="-1" width="12" height="3" rx="1" fill="#0f172a"/>
    <rect x="-4" y="0" width="2" height="1" fill="#10b981"/>
    <rect x="-1" y="0" width="2" height="1" fill="#10b981"/>
    <rect x="2" y="0" width="2" height="1" fill="#10b981"/>
  </g>
</svg>