<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Circuit Pattern -->
  <g stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.15">
    <path d="M100 100 L200 100 L250 150 L350 150"/>
    <path d="M1100 100 L1000 100 L950 150 L850 150"/>
    <path d="M100 530 L200 530 L250 480 L350 480"/>
    <path d="M1100 530 L1000 530 L950 480 L850 480"/>
    <circle cx="100" cy="100" r="8"/>
    <circle cx="1100" cy="100" r="8"/>
    <circle cx="100" cy="530" r="8"/>
    <circle cx="1100" cy="530" r="8"/>
    <circle cx="200" cy="100" r="5" fill="#3b82f6"/>
    <circle cx="1000" cy="100" r="5" fill="#3b82f6"/>
    <circle cx="200" cy="530" r="5" fill="#3b82f6"/>
    <circle cx="1000" cy="530" r="5" fill="#3b82f6"/>
  </g>
  
  <!-- Left Side: Robot Logo -->
  <g transform="translate(250 315)">
    <!-- Glow Circle -->
    <circle cx="0" cy="0" r="180" fill="url(#accentGradient)" opacity="0.1" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
    
    <!-- Robot Head -->
    <g transform="translate(0 -20)">
      <!-- Antenna -->
      <line x1="0" y1="-100" x2="0" y2="-135" stroke="#64748b" stroke-width="5"/>
      <circle cx="0" cy="-135" r="15" fill="#f97316" filter="url(#glow)"/>
      
      <!-- Head -->
      <rect x="-85" y="-100" width="170" height="140" rx="25" fill="#1e293b"/>
      <rect x="-80" y="-95" width="160" height="130" rx="20" fill="#334155"/>
      
      <!-- Eyes Container -->
      <rect x="-70" y="-70" width="140" height="60" rx="10" fill="#0f172a"/>
      
      <!-- Left Eye -->
      <ellipse cx="-30" cy="-40" rx="22" ry="17" fill="#3b82f6"/>
      <ellipse cx="-30" cy="-45" rx="8" ry="5" fill="#fff" opacity="0.9"/>
      
      <!-- Right Eye -->
      <ellipse cx="30" cy="-40" rx="22" ry="17" fill="#f97316"/>
      <ellipse cx="30" cy="-45" rx="8" ry="5" fill="#fff" opacity="0.9"/>
      
      <!-- Mouth Display -->
      <rect x="-50" y="15" width="100" height="25" rx="5" fill="#0f172a"/>
      <g fill="#10b981">
        <rect x="-40" y="22" width="5" height="11" rx="1"/>
        <rect x="-30" y="20" width="5" height="15" rx="1"/>
        <rect x="-20" y="22" width="5" height="11" rx="1"/>
        <rect x="-10" y="20" width="5" height="15" rx="1"/>
        <rect x="0" y="22" width="5" height="11" rx="1"/>
        <rect x="10" y="20" width="5" height="15" rx="1"/>
        <rect x="20" y="22" width="5" height="11" rx="1"/>
        <rect x="30" y="24" width="5" height="7" rx="1"/>
      </g>
      
      <!-- Neck -->
      <rect x="-20" y="40" width="40" height="30" fill="#475569"/>
    </g>
  </g>
  
  <!-- Right Side: Text -->
  <g transform="translate(600 315)">
    <!-- Title -->
    <text x="0" y="-60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="bold" fill="#f8fafc" text-anchor="start">Tanner's Tech News</text>
    
    <!-- Tagline -->
    <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" fill="#94a3b8" text-anchor="start">AI-Curated Daily Tech Roundup</text>
    
    <!-- Decorative Line -->
    <line x1="0" y1="60" x2="300" y2="60" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Subtitle -->
    <text x="0" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#64748b" text-anchor="start">Fresh tech insights every morning</text>
  </g>
  
  <!-- Signal Waves -->
  <g opacity="0.3" stroke="#3b82f6" stroke-width="3" fill="none">
    <path d="M50 315 Q100 280 150 300"/>
    <path d="M1150 315 Q1100 350 1050 330"/>
  </g>
</svg>